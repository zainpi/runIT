<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#4A90D9"/>
  <!-- Chibi stick figure head -->
  <circle cx="64" cy="38" r="22" fill="#FFCC99" stroke="#222" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="56" cy="34" r="4" fill="#222"/>
  <circle cx="72" cy="34" r="4" fill="#222"/>
  <circle cx="57" cy="33" r="1.5" fill="white"/>
  <circle cx="73" cy="33" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M56 44 Q64 50 72 44" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="54" y="60" width="20" height="26" rx="4" fill="#E74C3C" stroke="#222" stroke-width="3"/>
  <!-- Arms -->
  <line x1="54" y1="66" x2="38" y2="80" stroke="#FFCC99" stroke-width="5" stroke-linecap="round"/>
  <line x1="74" y1="66" x2="90" y2="80" stroke="#FFCC99" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="58" y1="86" x2="52" y2="110" stroke="#222" stroke-width="5" stroke-linecap="round"/>
  <line x1="70" y1="86" x2="76" y2="110" stroke="#222" stroke-width="5" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="50" cy="112" rx="8" ry="5" fill="#333"/>
  <ellipse cx="78" cy="112" rx="8" ry="5" fill="#333"/>
  <!-- Sword -->
  <rect x="88" y="74" width="5" height="28" rx="2" fill="#C0C0C0" stroke="#666" stroke-width="1.5"/>
  <rect x="83" y="74" width="15" height="5" rx="2" fill="#8B6914"/>
  <circle cx="90" cy="72" r="4" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
</svg>
